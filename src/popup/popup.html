<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAP Guide</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #4f46e5;
      --primary-h: #4338ca;
      --text:      #111827;
      --muted:     #6b7280;
      --bg:        #f9fafb;
      --card:      #ffffff;
      --border:    #e5e7eb;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    /* ── Header ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header__logo { font-size: 22px; }
    .header__info { flex: 1; }
    .header__title { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .header__sub   { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #eef2ff;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--primary);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #86efac;
      flex-shrink: 0;
    }
    .status-dot--inactive { background: var(--muted); }

    /* ── Sección ── */
    .section {
      padding: 14px 16px 8px;
    }
    .section__title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── Tarjetas de flujo ── */
    .flow-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .flow-card:hover { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,70,229,0.12); }

    .flow-card__icon {
      font-size: 22px;
      flex-shrink: 0;
    }
    .flow-card__info { flex: 1; min-width: 0; }
    .flow-card__name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .flow-card__steps {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .flow-card__btn {
      flex-shrink: 0;
      padding: 5px 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .flow-card__btn:hover    { background: var(--primary-h); }
    .flow-card__btn--stop {
      background: #ef4444;
    }
    .flow-card__btn--stop:hover { background: #dc2626; }

    /* ── Mensaje vacío ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 18px 16px;
      line-height: 1.5;
    }
    .empty__icon { font-size: 28px; display: block; margin-bottom: 6px; }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }
    .footer a { color: var(--primary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Cabecera -->
  <div class="header">
    <span class="header__logo">🗺️</span>
    <div class="header__info">
      <div class="header__title">DAP Guide</div>
      <div class="header__sub">Digital Adoption Platform</div>
    </div>
  </div>

  <!-- Barra de estado -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Detectando página…</span>
  </div>

  <!-- Flujos disponibles -->
  <div class="section">
    <div class="section__title">Flujos disponibles</div>
    <div id="flowList">
      <p class="empty">
        <span class="empty__icon">🔍</span>
        Navega a una página compatible para ver los flujos disponibles.
      </p>
    </div>
  </div>

  <!-- Footer: versión leída dinámicamente desde manifest.json por popup.js -->
  <div class="footer" id="appFooter">
    Santander Consumer Bank Guide
  </div>

  <!-- FIX CSP: script externo en lugar de inline para cumplir con MV3 -->
  <script src="popup.js"></script>

</body>
</html>
